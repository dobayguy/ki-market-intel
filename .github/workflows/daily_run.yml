name: Daily Market Intel Scraper

on:
  schedule:
    # Runs at 21:45 UTC (1:45 PM PST)
    - cron: '45 21 * * *'
  workflow_dispatch: # Allows you to manually trigger it from the GitHub website anytime

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives the action permission to push the updated XML back to your repo

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/checkout@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 feedgen pytz

    - name: Run bot script
      run: python bot.py

    - name: Commit and Push updated RSS feed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add market_intel_rss.xml
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily RSS feed update" && git push)
